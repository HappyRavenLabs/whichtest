      en: "Hi, I'm Jakub, since 2019 I am a researcher at the Institute of Information Technology at Lodz University of Technology. My academic pursuits are focused on artificial intelligence, specifically machine learning and its applications across various domains. I am passionate about exploring how machine learning can be leveraged to solve complex problems and drive innovation in technology."
      pl: "Cześć, jestem Jakub, od 2019 roku jestem zawodowo związany z Politechniką Łódzką. Moje badania koncentrują się na sztucznej inteligencji, a w szczególności na uczeniu maszynowym i jego zastosowaniach w różnych dziedzinach. Najbardziej ciekawi mnie, jak uczenie maszynowe może być wykorzystane do rozwiązywania złożonych problemów i napędzania innowacji w technologii."
