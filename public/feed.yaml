# Global glossary definitions
glossary:
  distribution:
    en: "Data distribution is essentially the \"shape\" of the data. It shows how often different values occur in a dataset."
    pl: "Rozkład danych to tak naprawdę \"kształt\" danych. Pokazuje on, jak często występują różne wartości w zbiorze danych."
  normal:
    en: "The normal distribution, also known as the Gaussian distribution, resembles a bell curve. Hence its alternative name: bell curve."
    pl: "Rozkład normalny, znany również jako rozkład Gaussa, przypomina dzwon. Stąd też jego alternatywna nazwa: krzywa dzwonowa."
  categorical:
    en: "Categorical data describe qualitative variables, e.g. gender, eye color, education. They can be nominal (without natural order) or ordinal (with natural order)."
    pl: "Dane kategoryczne, opisują zmienne jakościowe, np. płeć, kolor oczu, wykształcenie. Mogą być nominalne (bez naturalnego porządku) lub porządkowe (z naturalnym porządkiem)."
  numerical:
    en: "Numerical data represent measurable quantities and can be divided into discrete (e.g., number of children) or continuous (e.g., height) types. Another classification is interval data (with constant differences, e.g., temperature in degrees Celsius) and ratio data (with absolute zero, e.g., weight or temperature in kelvins)."
    pl: "Dane numeryczne to dane ilościowe, liczby, które można mierzyć. Mogą być dyskretne (np. liczba dzieci) lub ciągłe (np. wzrost). Inny podział to: dane interwałowe (mające stałe różnice, np. temperatura w stopniach Celsjusza) i ilorazowe (mające bezwzględne zero, np. waga lub temperatura w kelwinach)."
  multinomial:
    en: "The multinomial distribution describes the probabilities of different outcomes in a categorical dataset, e.g., series of rolls of a die."
    pl: "Rozkład wielomianowy opisuje prawdopodobieństwo wystąpienia różnych kategorii w zbiorze danych kategorycznych, np. wylosowanie cyfry 1-6 w serii kilku rzutów kostką."
  population:
    en: "The population is the set of all units that interest us in the context of the study, e.g., all residents of Poland, all customers of a given company, all temperature measurements in a given period of time."
    pl: "Populacja to zbiór wszystkich jednostek, które interesują nas w kontekście badania, np. wszyscy mieszkańcy Polski, wszyscy klienci danej firmy, wszystkie pomiary temperatury w danym okresie czasu."
  paired:
    en: "Paired data refers to data that is linked between studies, e.g., the same patients before and after therapy, measurements of the same group of people at two different points in time, measurements of the same group of people under two different conditions (e.g., at rest and after exertion)."
    pl:  Sparowane dane, to dane, które są ze sobą powiązane między badaniami, np. ci sami pacjenci przed i po zastosowaniu terapii, pomiary tej samej grupy osób w dwóch różnych momentach czasu, pomiary tej samej grupy osób w dwóch różnych warunkach (np. w spoczynku i po wysiłku).
  variance:
    en: "Variance is a measure of the dispersion of data points around the mean. High variance indicates that the data points are more spread out, while low variance suggests that they are more clustered around the mean."
    pl: "Wariancja danych to miara rozproszenia danych wokół średniej. Wysoka wariancja oznacza, że dane są bardziej rozproszone, podczas gdy niska wariancja wskazuje, że dane są bardziej skupione wokół średniej."
items:
  - id: "distribution"
    label: 
      en: "How does the data [distribution]{{term:distribution}} look like?"
      pl: "Jak wygląda [rozkład]{{term:distribution}} danych?"
    content:
      en: Using goodness-of-fit tests, we can check whether the sample we have deviates from a theoretical distribution, e.g., normal or multinomial.
      pl: Korzystając z testów istotności możemy sprawdzić, czy próbka, którą dysponujemy odbiega od założonego [rozkładu]{{term:distribution}} teoretycznego, np. normalnego, czy wielomianowego.
    children:
      - id: "categorical"
        label:
          en: "I have [categorical]{{term:categorical}} data"
          pl: "Mam [dane kategoryczne]{{term:categorical}}"
        children:
          - id: "goodness-of-fit"
            label:
              en: "Does the data fit a theoretical [distribution]{{term:distribution}}?"
              pl: "Czy dane pasują do [rozkładu]{{term:distribution}} teoretycznego?"
            children:
              - id: "chi-squared"
                label:
                  en: "Chi-squared test"
                  pl: "Test chi-kwadrat"
                content:
                  en: |
                    The chi-squared goodness-of-fit test is used to assess whether categorical data **deviate** from a specified theoretical distribution. 
                    For example, whether the level of education in a sample corresponds to a [multinomial]{{term:multinomial}} distribution.

                    $$
                    H_0: \text{The data fit the theoretical distribution}
                    $$
                    $$
                    H_a: \text{The data do not fit the theoretical distribution}
                    $$
                  pl: | 
                    Test dopasowanie $\chi^2$ (czytaj: chi-kwadrat) jest używany do oceny, 
                    czy dane kategoryczne **odbiegają** od określonego rozkładu teoretycznego.
                    Np. czy poziom wykształcenia w próbie odpowiada rozkładowi [wielomianowemu]{{term:multinomial}}.

                    $$
                    H_0: \text{Dane pasują do rozkładu teoretycznego}
                    $$
                    $$
                    H_a: \text{Dane nie pasują do rozkładu teoretycznego}
                    $$

      - id: "numerical"
        label:
          en: "I have [numerical]{{term:numerical}} data"
          pl: "Mam [dane numeryczne]{{term:numerical}}"
        children:
          - id: "is-normal"
            label: 
              en: "I want to check if the [distribution]{{term:distribution}} is [normal]{{term:normal}}"
              pl: "Chcę sprawdzić, czy [rozkład]{{term:distribution}} jest [normalny]{{term:normal}}"
            children:
              - id: "shapiro-wilk"
                label:
                  en: "Shapiro-Wilk test"
                  pl: "Test Shapiro-Wilka"
                content:
                  en: |
                    The Shapiro-Wilk test, alongside the Kolmogorov-Smirnov test, allows us to assess whether the data we are examining **deviate** from a normal distribution.
                    $$
                    H_0: \text{The data come from a normal distribution}
                    $$
                    $$
                    H_a: \text{The data do not come from a normal distribution}
                    $$

                    Although the Shapiro-Wilk test is recommended for small samples, in practice it is often used for larger datasets as well. Numerous studies show that the S-W test is generally a better indicator of data deviating from normality [1].

                    ---

                    [1] Shapiro, Samuel S., Martin B. Wilk, and Hwei J. Chen. "A comparative study of various tests for normality." Journal of the American statistical association 63.324 (1968): 1343-1372.
                  pl: |
                    Test Shapiro-Wilka, obok testu Kołmogorowa-Smirnowa, umożliwia ocenę, czy dane, które badamy **odbiegają** od rozkładu normalnego.
                    $$
                    H_0: \text{Dane pochodzą z rozkładu normalnego}
                    $$
                    $$
                    H_a: \text{Dane nie pochodzą z rozkładu normalnego}
                    $$

                    Chociaż test Shapiro-Wilka jest rekomendowany dla małych próbek, 
                    to w praktyce jest często stosowany również dla większych zbiorów danych. 
                    Liczne badania wykazują, że test S-W jest na ogół lepszym wyznacznikiem danych odbiegających od normalnych [1].

                    ---

                    [1] Shapiro, Samuel S., Martin B. Wilk, and Hwei J. Chen. "A comparative study of various tests for normality." Journal of the American statistical association 63.324 (1968): 1343-1372.

  - id: "compare"
    label:
      en: Does [population]{{term:populations}} differ from ...?
      pl: Czy [populacja]{{term:populations}} różni się od ...?
    content:
      en: Having one group of data, we can compare its [distribution]{{term:distribution}} parameters to theoretical value (one sample) or to other groups of data.
      pl: Mając jedną grupę danych, możemy porównać parametry jej [rozkładu]{{term:distribution}} z wartościami teoretycznymi (jedna próbka) lub z innymi grupami danych.
    children:
      - id: "single-sample"
        label:
          en: Theoretically expected value
          pl: Teoretycznej wartości
        children:
          - id: "is-normal"
            label: 
              en: "The distribution of the data is [normal]{{term:normal}}"
              pl: "Rozkład danych jest [normalny]{{term:normal}}"
            children:
              - id: "one-sample-t-test"
                label:
                  en: "One-sample t-test"
                  pl: "Test t-Studenta dla jednej próbki"
                content:
                  en: |
                    The one-sample t-test is used to compare the mean value of a sample ($\bar{x}$) to a theoretical value ($\mu_0$).

                    $$
                    H_0: \bar{x} = \mu_0
                    $$
                    For a two-tailed test, the alternative hypothesis is:
                    $$
                    H_a: \bar{x} \neq \mu_0
                    $$
                    while for a one-tailed test:
                    $$
                    H_a: \bar{x} > \mu_0
                    $$
                    or
                    $$
                    H_a: \bar{x} < \mu_0
                    $$

                    Under the assumption of the null hypothesis, the distribution of data is a t-Student distribution with $n-1$ degrees of freedom, where $n$ is the sample size.
                  pl: |
                    Test t-Studenta dla jednej próbki służy do porównania średniej wartości z próby ($\bar{x}$) z wartością teoretyczną ($\mu_0$).

                    $$
                    H_0: \bar{x} = \mu_0
                    $$

                    dla testu dwustronnego hipoteza alternatywna brzmi:
                    $$
                    H_a: \bar{x} \neq \mu_0
                    $$

                    podczas gdy dla testu jednostronnego:
                    $$
                    H_a: \bar{x} > \mu_0
                    $$
                    lub
                    $$
                    H_a: \bar{x} < \mu_0
                    $$

                    Przy założeniu prawdziwości hipotezy zerowej, rozkład danych jest rozkładem t-Studenta z $n-1$ stopniami swobody, gdzie $n$ to liczebność próby.
          - id: "not-normal"
            label:
              en: "The distribution of the data is not [normal]{{term:normal}}"
              pl: "Rozkład danych nie jest [normalny]{{term:normal}}"
            children:
              - id: "is-symmetric"
                label:
                  en: "The distribution of the data is roughly symmetric"
                  pl: "Rozkład danych jest mniej więcej symetryczny"
                children:
                - id: "wilcoxon-signed-rank-test"
                  label:
                    en: "Wilcoxon signed-rank test"
                    pl: "Test Wilcoxona dla jednej próbki"
                  content:
                    en: |

                    pl: |
                      Test Wilcoxona dla jednej próbki pozwala ocenić, 
                      czy istnieje istotna różnica między medianą z badanej próby ($M$) a wartością teoretyczną ($M_0$). 

                      $$
                      H_0: M = M_0
                      $$
                      $$
                      H_a: M \neq M_0
                      $$


                      Dla danych o [rozkładzie]{{term:distribution}} symetrycznym, 
                      test Wilcoxona dla jednej próbki jest uznawany za lepszy, 
                      ponieważ, w przeciwieństwie do testu znaków, bierze pod uwagę 
                      nie tylko kierunek różnicy, ale także jej wielkość.
              - id: "not-symmetric"
                label:
                  en: "[The distribution]{{term:distribution}} of the data is rather not symmetric"
                  pl: "[Rozkład]{{term:distribution}} danych raczej nie jest symetryczny"
                children:
                  - id: "sign-test"
                    label:
                      en: "Sign test"
                      pl: "Test znaków"
                    content:
                      en: |
                        The sign test is a simple test for comparing the median of a single sample to a theoretical value $M_0$. 

                        $$
                        H_0: M = M_0
                        $$
                        $$
                        H_a: M \neq M_0
                        $$

                        The test consists of counting how many observations in the sample are greater than, and how many are less than the theoretical value $M_0$. Values equal to the median are ignored, reducing the sample size by the number of observations equal to the median.

                        The distribution of data under the assumption of the null hypothesis is a binomial distribution with parameter $p=0.5$.
                      pl: |
                        Test znaków jest prostym testem do porównania mediany jednej próbki z wartością teoretyczną $M_0$. 

                        $$
                        H_0: M = M_0
                        $$
                        $$
                        H_a: M \neq M_0
                        $$

                        Test polega na zliczeniu, ile obserwacji z badanej próbki jest większych, 
                        a ile mniejszych od wartości teoretycznej $M_0$. Wartości równe medianie sśą ignorowane, 
                        zmniejszając liczebność próby o liczbę obserwacji równych medianie.

                        Rozkładem danych przy założeniu prawdziwości hipotezy zerowej jest rozkład dwumianowy z parametrem $p=0.5$.


      - id: "two-samples"
        label:
          en: From the other group of data
          pl: Od innej grupy danych
        children:
          - id: "is-normal"
            label: 
              en: "The distribution of both groups is [normal]{{term:normal}}"
              pl: "Rozkład w obu grupach jest [normalny]{{term:normal}}"
            children:
              - id: "paired-samples"
                label:
                  en: The groups are [paired]{{term:paired}}
                  pl: Grupy są [sparowane]{{term:paired}}
                children:
                  - id: "paired-t-test"
                    label:
                      en: "Student's t-test for paired samples"
                      pl: "Test t-Studenta dla prób sparowanych"
                    content:
                      en: |
                        The t-test for paired samples is used when the data in both groups being compared are related to each other, e.g., patients before and after therapy.
                        This test compares the mean $\bar{x}_a$ from the group before manipulation (e.g., before therapy) and $\bar{x}_A$ — from the group after manipulation (e.g., after therapy).

                        $$
                        H_0: \bar{x}_a = \bar{x}_A
                        $$
                        $$
                        H_a: \bar{x}_a \neq \bar{x}_A
                        $$
                        Other forms of the alternative hypothesis are:
                        $$
                        H_a: \bar{x}_a > \bar{x}_A
                        $$
                        or
                        $$
                        H_a: \bar{x}_a < \bar{x}_A
                        $$

                        Under the assumption of the null hypothesis, the distribution of data is a t-Student distribution with $n-1$ degrees of freedom, where $n$ is the number of pairs of data (e.g., number of patients).
                      pl: | 
                        Test t-Studenta dla prób sparowanych jest stosowany, gdy dane w obu badanych grupach są ze sobą związane, np. pacjenci przed i po terapii. 
                        Test ten porównuje średnią $\bar{x}_a$ z grupy przed manipulacją (np. przed terapią) i $\bar{x}_A$ — z grupy po manipulacji (np. po terapii).

                        $$
                        H_0: \bar{x}_a = \bar{x}_A
                        $$
                        $$
                        H_a: \bar{x}_a \neq \bar{x}_A
                        $$

                        Inne formy hipotezy alternatywnej to:
                        $$
                        H_a: \bar{x}_a > \bar{x}_A
                        $$
                        lub
                        $$
                        H_a: \bar{x}_a < \bar{x}_A
                        $$

                        Przy założeniu prawdziwości hipotezy zerowej, rozkład danych jest rozkładem t-Studenta z $n-1$ stopniami swobody, gdzie $n$ to liczebność pary danych (np. liczba pacjentów).
                        
              - id: "unpaired-samples"
                label:
                  en: The groups are not [paired]{{term:paired}}
                  pl: Grupy nie są [sparowane]{{term:paired}}
                children:
                  - id: "variances-equal"
                    label:
                      en: "The groups have equal [variances]{{term:variance}}"
                      pl: "Grupy mają równe [wariancje]{{term:variance}}"
                    children:
                      - id: "t-test"
                        label:
                          en: "Student's t-test for independent samples"
                          pl: "Test t-Studenta dla prób niezależnych"
                        content:
                          en: |

                          pl: | 
                            Jeden z wariantów testu t-Studenta jest stosowany do prób niezależnych, pod warunkiem, że [wariancje]{{term:variance}} w obu grupach są równe.
                            Mamy tu udo czynienia z dwiema osobnymi grupami danych, między którymi nie ma żadnego związku, np. grupa mężczyzn i grupa kobiet albo grupa pacjentów przyjmujących lek oraz grupa pacjentów przyjmujących placebo.
                            Test ten porównuje średnią $\bar{x}_1$ z pierwszej grupy i $\bar{x}_2$ z drugiej grupy.

                            $$
                            H_0: \bar{x}_1 = \bar{x}_2
                            $$
                            $$
                            H_a: \bar{x}_1 \neq \bar{x}_2
                            $$
                            Inne formy hipotezy alternatywnej to:
                            $$
                            H_a: \bar{x}_1 > \bar{x}_2
                            $$
                            lub
                            $$
                            H_a: \bar{x}_1 < \bar{x}_2
                            $$

                            Przy założeniu prawdziwości hipotezy zerowej, rozkład danych jest rozkładem t-Studenta z $n_1 + n_2 - 2$ stopniami swobody, gdzie $n_1$ i $n_2$ to liczebności obu grup.
                  - id: "variances-unequal"
                    label:
                      en: "The groups have unequal [variances]{{term:variance}}"
                      pl: "Grupy mają nierówne [wariancje]{{term:variance}}"
                    children:
                      - id: "welch-t-test"
                        label:
                          en: "Welch's t-test"
                          pl: "Test t-Studenta z korektą Welscha"
                        content:
                          en: |
                            When we are dealing with two independent groups of data, but the [variances]{{term:variance}} in these groups are different from each other (heterogeneity of variance), we can use the Welch's t-test, which is a modification of the standard Student's t-test for independent samples.
                            This test compares the mean $\bar{x}_1$ from the first group and $\bar{x}_2$ from the second group.
                            $$
                            H_0: \bar{x}_1 = \bar{x}_2
                            $$
                            $$
                            H_a: \bar{x}_1 \neq \bar{x}_2
                            $$
                            Other forms of the alternative hypothesis are:  
                            $$
                            H_a: \bar{x}_1 > \bar{x}_2
                            $$
                            or
                            $$
                            H_a: \bar{x}_1 < \bar{x}_2
                            $$

                            Under the assumption of the null hypothesis, the distribution 
                            of data is a t-Student distribution with $v$ degrees of freedom,
                             where $v$ is calculated according to the Welch-Satterthwaite formula.
                            For two groups with sample sizes $n_1$ and $n_2$ and variances
                             $s_1^2$ and $s_2^2$, the number of degrees of freedom $v$ 
                             is calculated according to the formula:  

                            $$
                            v = \frac{\left( \frac{s_1^2}{n_1} + \frac{s_2^2}{n_2} \right)^2}{\frac{\left( \frac{s_1^2}{n_1} \right)^2}{n_1 - 1} + \frac{\left( \frac{s_2^2}{n_2} \right)^2}{n_2 - 1}}
                            $$
                          pl: | 
                            Gdy mamy do czynienia z dwiema niezależnymi grupami danych, 
                            ale [wariancje]{{term:variance}} w tych grupach są od siebie różne (heterogeniczność wariancji), 
                            możemy skorzystać z testu t-Studenta z korektą Welscha, który jest modyfikacją standardowego testu t-Studenta dla prób niezależnych.
                            Test ten porównuje średnią $\bar{x}_1$ z pierwszej grupy i $\bar{x}_2$ z drugiej grupy.

                            $$
                            H_0: \bar{x}_1 = \bar{x}_2
                            $$
                            $$
                            H_a: \bar{x}_1 \neq \bar{x}_2
                            $$
                            Inne formy hipotezy alternatywnej to:
                            $$
                            H_a: \bar{x}_1 > \bar{x}_2
                            $$
                            lub
                            $$
                            H_a: \bar{x}_1 < \bar{x}_2
                            $$

                            Przy założeniu prawdziwości hipotezy zerowej, 
                            rozkład danych jest rozkładem t-Studenta z $v$ stopniami swobody, 
                            gdzie $v$ jest obliczane według wzoru Welcha-Satterthwaite'a.
                            Dla dwóch grup o liczebnościach $n_1$ i $n_2$ oraz wariancjach $s_1^2$ i $s_2^2$,
                            liczba stopni swobody $v$ jest obliczana według wzoru:

                            $$
                            v = \frac{\left( \frac{s_1^2}{n_1} + \frac{s_2^2}{n_2} \right)^2}{\frac{\left( \frac{s_1^2}{n_1} \right)^2}{n_1 - 1} + \frac{\left( \frac{s_2^2}{n_2} \right)^2}{n_2 - 1}}
                            $$
                            
          - id: "not-normal"
            label:
              en: "The distribution of at least one group is not [normal]{{term:normal}}"
              pl: "Rozkład przynajmniej jednej grupy nie jest [normalny]{{term:normal}}"
            children:
              - id: "paired-samples"
                label:
                  en: The groups are [paired]{{term:paired}}
                  pl: Grupy są [sparowane]{{term:paired}}
                children:
                  - id: "wilcoxon-signed-rank-test"
                    label:
                      en: Wilcoxon signed-rank test
                      pl: Test Wilcoxona dla prób sparowanych
                    content:
                      en: | 
                      pl: | 
              - id: "unpaired-samples"
                label:
                  en: The groups are not [paired]{{term:paired}}
                  pl: Grupy nie są [sparowane]{{term:paired}}
                children:
                  - id: "mann-whitney-u-test"
                    label:
                      en: Mann-Whitney U test
                      pl: Test U Manna-Whitneya
                    content:
                      en: |

                      pl: |
      - id: "more-than-two-samples"
        label:
          en: From several other groups of data (>2)
          pl: Od kilku innych grup danych (>2)
        children:
          - id: "is-normal"
            label:
              en: "The distribution of all groups is [normal]{{term:normal}}?"
              pl: "Rozkład we wszystkich grupach jest [normalny]{{term:normal}}?"
            children:
              - id: "variances-equal"
                label:
                  en: "All groups have equal [variances]{{term:variance}}"
                  pl: "Wszystkie grupy mają równe [wariancje]{{term:variance}}"
                children:
                  - id: "anova"
                    label:
                      en: "One-way ANOVA"
                      pl: "Jednoczynnikowa analiza wariancji (ANOVA)"
                    content:
                      en: |
                      pl: |
              - id: "variances-unequal"
                label:
                  en: "At least one group has unequal [variance]{{term:variance}}"
                  pl: "Przynajmniej jedna grupa ma nierówną [wariancję]{{term:variance}}"
                children:
                  - id: "welch-anova"
                    label:
                      en: "Welch's ANOVA"
                      pl: "ANOVA z korektą Welscha"
  - id: "correlation"
    label:
      en: Is there a relationship between two variables?
      pl: Czy istnieje związek między dwiema zmiennymi?
      
