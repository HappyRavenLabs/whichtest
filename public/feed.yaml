# Global glossary definitions
glossary:
  distribution:
    en: "Data distribution is essentially the \"shape\" of the data. It shows how often different values occur in a dataset."
    pl: "Rozkład danych to tak naprawdę \"kształt\" danych. Pokazuje on, jak często występują różne wartości w zbiorze danych."
  normal:
    en: "The normal distribution, also known as the Gaussian distribution, resembles a bell curve. Hence its alternative name: bell curve."
    pl: "Rozkład normalny, znany również jako rozkład Gaussa, przypomina dzwon. Stąd też jego alternatywna nazwa: krzywa dzwonowa."
  categorical:
    en: "Categorical data describe qualitative variables, e.g. gender, eye color, education. They can be nominal (without natural order) or ordinal (with natural order)."
    pl: "Dane kategoryczne, opisują zmienne jakościowe, np. płeć, kolor oczu, wykształcenie. Mogą być nominalne (bez naturalnego porządku) lub porządkowe (z naturalnym porządkiem)."
  numerical:
    en: "Numerical data represent measurable quantities and can be divided into discrete (e.g., number of children) or continuous (e.g., height) types. Another classification is interval data (with constant differences, e.g., temperature in degrees Celsius) and ratio data (with absolute zero, e.g., weight or temperature in kelvins)."
    pl: "Dane numeryczne to dane ilościowe, liczby, które można mierzyć. Mogą być dyskretne (np. liczba dzieci) lub ciągłe (np. wzrost). Inny podział to: dane interwałowe (mające stałe różnice, np. temperatura w stopniach Celsjusza) i ilorazowe (mające bezwzględne zero, np. waga lub temperatura w kelwinach)."
  multinomial:
    en: "The multinomial distribution describes the probabilities of different outcomes in a categorical dataset, e.g., series of rolls of a die."
    pl: "Rozkład wielomianowy opisuje prawdopodobieństwo wystąpienia różnych kategorii w zbiorze danych kategorycznych, np. wylosowanie cyfry 1-6 w serii kilku rzutów kostką."
  population:
    en: "The population is the set of all units that interest us in the context of the study, e.g., all residents of Poland, all customers of a given company, all temperature measurements in a given period of time."
    pl: "Populacja to zbiór wszystkich jednostek, które interesują nas w kontekście badania, np. wszyscy mieszkańcy Polski, wszyscy klienci danej firmy, wszystkie pomiary temperatury w danym okresie czasu."
  paired:
    en: "Paired data refers to data that is linked between studies, e.g., the same patients before and after therapy, measurements of the same group of people at two different points in time, measurements of the same group of people under two different conditions (e.g., at rest and after exertion)."
    pl:  Sparowane dane, to dane, które są ze sobą powiązane między badaniami, np. ci sami pacjenci przed i po zastosowaniu terapii, pomiary tej samej grupy osób w dwóch różnych momentach czasu, pomiary tej samej grupy osób w dwóch różnych warunkach (np. w spoczynku i po wysiłku).
  variance:
    en: "Variance is a measure of the dispersion of data points around the mean. High variance indicates that the data points are more spread out, while low variance suggests that they are more clustered around the mean."
    pl: "Wariancja danych to miara rozproszenia danych wokół średniej. Wysoka wariancja oznacza, że dane są bardziej rozproszone, podczas gdy niska wariancja wskazuje, że dane są bardziej skupione wokół średniej."
  non-parametric:
    en: Non-parametric test is a statistical test that does not assume a specific distribution of the data, usually normal. Such a test has significantly fewer assumptions than a parametric test, but it is also less sensitive, meaning it has lower statistical power.
    pl: Test nieparametryczny to test statystyczny, który nie zakłada określonego rozkładu danych, zawzyczaj normalnego. Taki test ma zdecydowanie mniejszą liczbę założeń niż test parametryczny, ale jest też mniej czuły, czyli ma mniejszą moc statystyczną.
  ranks:
    en: Ranks are the positions of data points in an ordered dataset, e.g., the dataset [100, -10, 2, -4] would have ranks [4, 1, 3, 2], as -10 is the smallest value and 100 is the largest.
    pl: Rangi to pozycje danych w uporządkowanym zbiorze danych, np. dane [100, -10, 2, -4] będą miały rangi [4, 1, 3, 2], ponieważ -10 jest najmniejszą wartością, a 100 największą.
  omnibus:
    en: Omnibus tests are statistical tests that check for overall differences between groups, without specifying which groups differ. 
    pl: Test omnibusowy sprawdza, czy zachodzą jakiekolwiek istotne różnice między grupami danych, ale nie wskazuje, które grupy różnią się między sobą.
  correlation:
    en: Correlation is a measure that indicates the strength and co-occurrence of two variables, e.g., when an increase in one value is accompanied by an increase in the other, the correlation between them is strong and positive. Negative correlation occurs when an increase in one variable is accompanied by a decrease in the other.
    pl: Korelacja to miara, która określa siłę i współwystępowanie dwóch zmiennych, np. gdy wzrost jednej wartości towarzyszy wzrostowi drugiej, korelacja między nimi jest silna i dodatnia. Ujemna korelacja występuje wtedy, gdy wzrostowi jedenj zmiennej towarzyszy spadek drugiej.
  outlier:
    en: An outlier is a data point that is significantly different from the others, atypical. It is not necessarily the result of an error or fraud (e.g., heavy rainfall causing flooding).
    pl: Wartość odstająca to wartość skrajnie różna od pozostałych, nietypowa. Niekoniecznie jest ona wynikiem błędu lub oszustwa (np. intensywne opady deszczu powodujące powódź).
  anomaly:
    en: An anomaly is a rare value that is the result of an error or deliberate manipulation (fraud).
    pl: Anomalia to wartość rzadka, która jest wynikiem błędu lub celowej manipulacji (oszustwa).
  dependent_samples:
    en: Observations in the sample are dependent on each other. An example of dependent data could be a time series, i.e., consecutive values of the same variable over time (e.g., today's temperature measurements are related to yesterday's temperature measurements).
    pl: "Obserwacje próby zależą od siebie. Przykładem danych zależnych może być szereg czasowy, tj. kolejne wartości tej samej zmiennej w czasie (np. pomiary temperatury dzisiaj są powiązane z pomiarami temperatury wczoraj)."
  tied_ranks:
    en: Tied ranks are ranks assigned to data points that have the same value. For example, in the dataset [100, -10, 2, -4, 2], the values 2 are repeated, so the ranks for these values will be equal (3.5), rather than 3 and 4.
    pl: Rangi wiązane to rangi przypisane danym, które mają tę samą wartość. Na przykład, w zbiorze danych [100, -10, 2, -4, 2], wartości 2 powtarzają się, więc rangi dla tych wartości będą równe (3.5), a nie 3 i 4.
  dichotomous:
    en: A dichotomous variable is a variable that takes on only two values, e.g., true-false, female-male or yes-no.
    pl: Zmienna dychotomiczna to zmienna, która przyjmuje tylko dwie wartości, np. prawda-fałsza, kobieta-mężczyzna albo tak-nie.
  degrees_of_freedom:
    en: Degrees of freedom refer to the number of independent values that can vary in an analysis without breaking any constraints. For example, if we have a bag with 4 balls of different colors (we know which) and we draw them one by one, the first ball can be a surprise; the second and third can also be surprises, but the fourth will be obvious because only one ball is left. Therefore, the number of degrees of freedom will be 3.
    pl: "Stopnie swobody to liczba niezależnych wartości, które mogą się swobodnie zmieniać. Przykład: mamy w woreczku 4 kule w różnych kolorach (wiemy jakich), wyciągamy je kolejno. Pierwsza kula może być niespodzianką; druga, trzecie również, ale 4 będzie oczywista, bo została nam już tylko jedna kula. Dlatego liczba stopni swobody wyniesie 3.""
  stationary:
    en: A stationary time series maintains its statistical property. Typically, it is understood as weak stationarity meaning the mean and variance of a time series remains constant over time.
    pl: "Stacjonarny szereg czasowy to taki, który zachowuje swoje właściwości statystyczne w czasie. Najczęściej jednak upraszcza się ten wymóg do tzw. słabej stacjonarności, czyli zachowania stałych w czasie: wartości średniej i wariancji"
items:
  - id: "distribution"
    label: 
      en: "How does the data [distribution]{{term:distribution}} look like?"
      pl: "Jak wygląda [rozkład]{{term:distribution}} danych?"
    content:
      en: Using goodness-of-fit tests, we can check whether the sample we have deviates from a theoretical distribution, e.g., normal or multinomial.
      pl: Korzystając z testów istotności możemy sprawdzić, czy próbka, którą dysponujemy odbiega od założonego [rozkładu]{{term:distribution}} teoretycznego, np. normalnego, czy wielomianowego.
    children:
      - id: "categorical"
        label:
          en: "I have [categorical]{{term:categorical}} data"
          pl: "Mam [dane kategoryczne]{{term:categorical}}"
        children:
          - id: "goodness-of-fit"
            label:
              en: "Does the data fit a theoretical [distribution]{{term:distribution}}?"
              pl: "Czy dane pasują do [rozkładu]{{term:distribution}} teoretycznego?"
            children:
              - id: "chi-squared"
                label:
                  en: "Chi-squared test"
                  pl: "Test chi-kwadrat"
                content:
                  en: |
                    The chi-squared goodness-of-fit test is used to assess whether categorical data **deviate** from a specified theoretical distribution. 
                    For example, whether the level of education in a sample corresponds to a [multinomial]{{term:multinomial}} distribution.

                    $$
                    H_0: \text{The data fit the theoretical distribution}
                    $$
                    $$
                    H_a: \text{The data do not fit the theoretical distribution}
                    $$
                  pl: | 
                    Test dopasowanie $\chi^2$ (czytaj: chi-kwadrat) jest używany do oceny, 
                    czy dane kategoryczne **odbiegają** od określonego rozkładu teoretycznego.
                    Np. czy poziom wykształcenia w próbie odpowiada rozkładowi [wielomianowemu]{{term:multinomial}}.

                    $$
                    H_0: \text{Dane pasują do rozkładu teoretycznego}
                    $$
                    $$
                    H_a: \text{Dane nie pasują do rozkładu teoretycznego}
                    $$

      - id: "numerical"
        label:
          en: "I have [numerical]{{term:numerical}} data"
          pl: "Mam [dane numeryczne]{{term:numerical}}"
        children:
          - id: "is-normal"
            label: 
              en: "I want to check if the [distribution]{{term:distribution}} is [normal]{{term:normal}}"
              pl: "Chcę sprawdzić, czy [rozkład]{{term:distribution}} jest [normalny]{{term:normal}}"
            children:
              - id: "shapiro-wilk"
                label:
                  en: "Shapiro-Wilk test"
                  pl: "Test Shapiro-Wilka"
                content:
                  en: |
                    The Shapiro-Wilk test, alongside the Kolmogorov-Smirnov test, allows us to assess whether the data we are examining **deviate** from a normal distribution.
                    $$
                    H_0: \text{The data come from a normal distribution}
                    $$
                    $$
                    H_a: \text{The data do not come from a normal distribution}
                    $$

                    Although the Shapiro-Wilk test is recommended for small samples, in practice it is often used for larger datasets as well. Numerous studies show that the S-W test is generally a better indicator of data deviating from normality [1].

                    ---

                    [1] Shapiro, Samuel S., Martin B. Wilk, and Hwei J. Chen. "A comparative study of various tests for normality." Journal of the American statistical association 63.324 (1968): 1343-1372.
                  pl: |
                    Test Shapiro-Wilka, obok testu Kołmogorowa-Smirnowa, umożliwia ocenę, czy dane, które badamy **odbiegają** od rozkładu normalnego.
                    $$
                    H_0: \text{Dane pochodzą z rozkładu normalnego}
                    $$
                    $$
                    H_a: \text{Dane nie pochodzą z rozkładu normalnego}
                    $$

                    Chociaż test Shapiro-Wilka jest rekomendowany dla małych próbek, 
                    to w praktyce jest często stosowany również dla większych zbiorów danych. 
                    Liczne badania wykazują, że test S-W jest na ogół lepszym wyznacznikiem danych odbiegających od normalnych [1].

                    ---

                    [1] Shapiro, Samuel S., Martin B. Wilk, and Hwei J. Chen. "A comparative study of various tests for normality." Journal of the American statistical association 63.324 (1968): 1343-1372.

  - id: "compare"
    label:
      en: Does [population]{{term:populations}} differ from ...?
      pl: Czy [populacja]{{term:populations}} różni się od ...?
    content:
      en: Having one group of data, we can compare its [distribution]{{term:distribution}} parameters to theoretical value (one sample) or to other groups of data.
      pl: Mając jedną grupę danych, możemy porównać parametry jej [rozkładu]{{term:distribution}} z wartościami teoretycznymi (jedna próbka) lub z innymi grupami danych.
    children:
      - id: "single-sample"
        label:
          en: Theoretically expected value
          pl: Teoretycznej wartości
        children:
          - id: "is-normal"
            label: 
              en: "The distribution of the data is [normal]{{term:normal}}"
              pl: "Rozkład danych jest [normalny]{{term:normal}}"
            children:
              - id: "one-sample-t-test"
                label:
                  en: "One-sample t-test"
                  pl: "Test t-Studenta dla jednej próbki"
                content:
                  en: |
                    The one-sample t-test is used to compare the mean value in a population ($\mu$) to a theoretical value ($\mu_0$).

                    $$
                    H_0: \mu = \mu_0
                    $$
                    For a two-tailed test, the alternative hypothesis is:
                    $$
                    H_a: \mu \neq \mu_0
                    $$
                    while for a one-tailed test:
                    $$
                    H_a: \mu > \mu_0
                    $$
                    or
                    $$
                    H_a: \mu < \mu_0
                    $$

                    Under the assumption of the null hypothesis, the distribution of data is a t-Student distribution with $n-1$ [degrees of freedom]{{term:degrees_of_freedom}}, where $n$ is the sample size.
                  pl: |
                    Test t-Studenta dla jednej próbki służy do porównania średniej wartości w populacji ($\mu$) z wartością teoretyczną ($\mu_0$).

                    $$
                    H_0: \mu = \mu_0
                    $$

                    dla testu dwustronnego hipoteza alternatywna brzmi:
                    $$
                    H_a: \mu \neq \mu_0
                    $$

                    podczas gdy dla testu jednostronnego:
                    $$
                    H_a: \mu > \mu_0
                    $$
                    lub
                    $$
                    H_a: \mu < \mu_0
                    $$

                    Przy założeniu prawdziwości hipotezy zerowej, rozkład danych jest rozkładem t-Studenta z $n-1$ [stopniami swobody]{{term:degrees_of_freedom}}, gdzie $n$ to liczebność próby.
          - id: "not-normal"
            label:
              en: "The distribution of the data is not [normal]{{term:normal}}"
              pl: "Rozkład danych nie jest [normalny]{{term:normal}}"
            children:
              - id: "is-symmetric"
                label:
                  en: "The distribution of the data is roughly symmetric"
                  pl: "Rozkład danych jest mniej więcej symetryczny"
                children:
                - id: "wilcoxon-signed-rank-test"
                  label:
                    en: "Wilcoxon signed-rank test"
                    pl: "Test Wilcoxona dla jednej próbki"
                  content:
                    en: |

                    pl: |
                      Test Wilcoxona dla jednej próbki pozwala ocenić, 
                      czy istnieje istotna różnica między medianą z badanej próby ($M$) a wartością teoretyczną ($M_0$). 

                      $$
                      H_0: M = M_0
                      $$
                      $$
                      H_a: M \neq M_0
                      $$


                      Dla danych o [rozkładzie]{{term:distribution}} symetrycznym, 
                      test Wilcoxona dla jednej próbki jest uznawany za lepszy, 
                      ponieważ, w przeciwieństwie do testu znaków, bierze pod uwagę 
                      nie tylko kierunek różnicy, ale także jej wielkość.
              - id: "not-symmetric"
                label:
                  en: "[The distribution]{{term:distribution}} of the data is rather not symmetric"
                  pl: "[Rozkład]{{term:distribution}} danych raczej nie jest symetryczny"
                children:
                  - id: "sign-test"
                    label:
                      en: "Sign test"
                      pl: "Test znaków"
                    content:
                      en: |
                        The sign test is a simple test for comparing the median of a single sample to a theoretical value $M_0$. 

                        $$
                        H_0: M = M_0
                        $$
                        $$
                        H_a: M \neq M_0
                        $$

                        The test consists of counting how many observations in the sample are greater than, and how many are less than the theoretical value $M_0$. Values equal to the median are ignored, reducing the sample size by the number of observations equal to the median.

                        The distribution of data under the assumption of the null hypothesis is a binomial distribution with parameter $p=0.5$.
                      pl: |
                        Test znaków jest prostym testem do porównania mediany jednej próbki z wartością teoretyczną $M_0$. 

                        $$
                        H_0: M = M_0
                        $$
                        $$
                        H_a: M \neq M_0
                        $$

                        Test polega na zliczeniu, ile obserwacji z badanej próbki jest większych, 
                        a ile mniejszych od wartości teoretycznej $M_0$. Wartości równe medianie sśą ignorowane, 
                        zmniejszając liczebność próby o liczbę obserwacji równych medianie.

                        Rozkładem danych przy założeniu prawdziwości hipotezy zerowej jest rozkład dwumianowy z parametrem $p=0.5$.


      - id: "two-samples"
        label:
          en: From the other group of data
          pl: Od innej grupy danych
        children:
          - id: "is-normal"
            label: 
              en: "The distribution of both groups is [normal]{{term:normal}}"
              pl: "Rozkład w obu grupach jest [normalny]{{term:normal}}"
            children:
              - id: "paired-samples"
                label:
                  en: The groups are [paired]{{term:paired}}
                  pl: Grupy są [sparowane]{{term:paired}}
                children:
                  - id: "paired-t-test"
                    label:
                      en: "Student's t-test for paired samples"
                      pl: "Test t-Studenta dla prób sparowanych"
                    content:
                      en: |
                        The t-test for paired samples is used when the data in both groups being compared are related to each other, e.g., patients before and after therapy.
                        This test compares the mean $\mu_a$ from the group before manipulation (e.g., before therapy) and $\mu_A$ — from the group after manipulation (e.g., after therapy).

                        $$
                        H_0: \mu_a = \mu_A
                        $$
                        $$
                        H_a: \mu_a \neq \mu_A
                        $$
                        Other forms of the alternative hypothesis are:
                        $$
                        H_a: \mu_a > \mu_A
                        $$
                        or
                        $$
                        H_a: \mu_a < \mu_A
                        $$

                        Under the assumption of the null hypothesis, 
                        the distribution of data is a t-Student 
                        distribution with $n-1$ [degrees of freedom]{{term:degrees_of_freedom}}, 
                        where $n$ is the number of pairs of data (e.g., number of patients).
                      pl: |
                        Test t-Studenta dla prób sparowanych jest stosowany, gdy dane w obu badanych grupach są ze sobą związane, np. pacjenci przed i po terapii.
                        Test ten porównuje średnią $\mu_a$ z grupy przed manipulacją (np. przed terapią) i $\mu_A$ — z grupy po manipulacji (np. po terapii).

                        $$
                        H_0: \mu_a = \mu_A
                        $$
                        $$
                        H_a: \mu_a \neq \mu_A
                        $$

                        Inne formy hipotezy alternatywnej to:
                        $$
                        H_a: \mu_a > \mu_A
                        $$
                        lub
                        $$
                        H_a: \mu_a < \mu_A
                        $$

                        Przy założeniu prawdziwości hipotezy zerowej, 
                        rozkład danych jest rozkładem t-Studenta z $n-1$ [stopniami swobody]{{term:degrees_of_freedom}}, gdzie $n$ to liczebność pary danych (np. liczba pacjentów).

              - id: "unpaired-samples"
                label:
                  en: The groups are not [paired]{{term:paired}}
                  pl: Grupy nie są [sparowane]{{term:paired}}
                children:
                  - id: "variances-equal"
                    label:
                      en: "The groups have equal [variances]{{term:variance}}"
                      pl: "Grupy mają równe [wariancje]{{term:variance}}"
                    children:
                      - id: "t-test"
                        label:
                          en: "Student's t-test for independent samples"
                          pl: "Test t-Studenta dla prób niezależnych"
                        content:
                          en: |

                          pl: | 
                            Jeden z wariantów testu t-Studenta jest stosowany do prób niezależnych, pod warunkiem, że [wariancje]{{term:variance}} w obu grupach są równe.
                            Mamy tu udo czynienia z dwiema osobnymi grupami danych, między którymi nie ma żadnego związku, np. grupa mężczyzn i grupa kobiet albo grupa pacjentów przyjmujących lek oraz grupa pacjentów przyjmujących placebo.
                            Test ten porównuje średnią $\mu_1$ z pierwszej grupy i $\mu_2$ z drugiej grupy.

                            $$
                            H_0: \mu_1 = \mu_2
                            $$
                            $$
                            H_a: \mu_1 \neq \mu_2
                            $$
                            Inne formy hipotezy alternatywnej to:
                            $$
                            H_a: \mu_1 > \mu_2
                            $$
                            lub
                            $$
                            H_a: \mu_1 < \mu_2
                            $$

                            Przy założeniu prawdziwości hipotezy zerowej, rozkład danych jest rozkładem t-Studenta z $n_1 + n_2 - 2$ [stopniami swobody]{{term:degrees_of_freedom}}, gdzie $n_1$ i $n_2$ to liczebności obu grup.
                  - id: "variances-unequal"
                    label:
                      en: "The groups have unequal [variances]{{term:variance}}"
                      pl: "Grupy mają nierówne [wariancje]{{term:variance}}"
                    children:
                      - id: "welch-t-test"
                        label:
                          en: "Welch's t-test"
                          pl: "Test t-Studenta z korektą Welscha"
                        content:
                          en: |
                            When we are dealing with two independent groups of data, but the [variances]{{term:variance}} in these groups are different from each other (heterogeneity of variance), we can use the Welch's t-test, which is a modification of the standard Student's t-test for independent samples.
                            This test compares the mean $\mu_1$ from the first group and $\mu_2$ from the second group.
                            $$
                            H_0: \mu_1 = \mu_2
                            $$
                            $$
                            H_a: \mu_1 \neq \mu_2
                            $$
                            Other forms of the alternative hypothesis are:  
                            $$
                            H_a: \mu_1 > \mu_2
                            $$
                            or
                            $$
                            H_a: \mu_1 < \mu_2
                            $$

                            Under the assumption of the null hypothesis, the distribution 
                            of data is a t-Student distribution with $v$ [stopniami swobody]{{term:degrees_of_freedom}},
                             where $v$ is calculated according to the Welch-Satterthwaite formula.
                            For two groups with sample sizes $n_1$ and $n_2$ and variances
                             $s_1^2$ and $s_2^2$, the number of degrees of freedom $v$ 
                             is calculated according to the formula:  

                            $$
                            v = \frac{\left( \frac{s_1^2}{n_1} + \frac{s_2^2}{n_2} \right)^2}{\frac{\left( \frac{s_1^2}{n_1} \right)^2}{n_1 - 1} + \frac{\left( \frac{s_2^2}{n_2} \right)^2}{n_2 - 1}}
                            $$
                          pl: | 
                            Gdy mamy do czynienia z dwiema niezależnymi grupami danych, 
                            ale [wariancje]{{term:variance}} w tych grupach są od siebie różne (heterogeniczność wariancji), 
                            możemy skorzystać z testu t-Studenta z korektą Welscha, który jest modyfikacją standardowego testu t-Studenta dla prób niezależnych.
                            Test ten porównuje średnią $\mu_1$ z pierwszej grupy i $\mu_2$ z drugiej grupy.

                            $$
                            H_0: \mu_1 = \mu_2
                            $$
                            $$
                            H_a: \mu_1 \neq \mu_2
                            $$
                            Inne formy hipotezy alternatywnej to:
                            $$
                            H_a: \mu_1 > \mu_2
                            $$
                            lub
                            $$
                            H_a: \mu_1 < \mu_2
                            $$

                            Przy założeniu prawdziwości hipotezy zerowej, 
                            rozkład danych jest rozkładem t-Studenta z $v$ [stopniami swobody]{{term:degrees_of_freedom}},
                            gdzie $v$ jest obliczane według wzoru Welcha-Satterthwaite'a.
                            Dla dwóch grup o liczebnościach $n_1$ i $n_2$ oraz wariancjach $s_1^2$ i $s_2^2$,
                            liczba stopni swobody $v$ jest obliczana według wzoru:

                            $$
                            v = \frac{\left( \frac{s_1^2}{n_1} + \frac{s_2^2}{n_2} \right)^2}{\frac{\left( \frac{s_1^2}{n_1} \right)^2}{n_1 - 1} + \frac{\left( \frac{s_2^2}{n_2} \right)^2}{n_2 - 1}}
                            $$
                            
          - id: "not-normal"
            label:
              en: "The distribution of at least one group is not [normal]{{term:normal}}"
              pl: "Rozkład przynajmniej jednej grupy nie jest [normalny]{{term:normal}}"
            children:
              - id: "paired-samples"
                label:
                  en: The groups are [paired]{{term:paired}}
                  pl: Grupy są [sparowane]{{term:paired}}
                children:
                  - id: "wilcoxon-signed-rank-test"
                    label:
                      en: Wilcoxon signed-rank test
                      pl: Test Wilcoxona dla prób sparowanych
                    content:
                      en: | 
                        Wilcoxon signed-rank test for paired samples is 
                        a non-parametric alternative to the Student's t-test for paired groups.
                        The test is based on the ranks of the differences 
                        between pairs of data, rather than on the data values themselves, 
                        comparing the median $M_a$ from the group before manipulation 
                        (e.g., before therapy) and the median $M_A$ from the 
                        group after manipulation (e.g., after therapy).

                        $$
                        H_0: M_a = M_A
                        $$
                        $$
                        H_a: M_a \neq M_A
                        $$
                        Alternative forms of the alternative hypothesis are:
                        $$
                        H_a: M_a > M_A
                        $$
                        or
                        $$
                        H_a: M_a < M_A
                        $$
                      pl: |
                        Test Wilcoxona dla prób zależnych (sparowanych) jest 
                        [nieparametryczną]{{term:non-parametric}} alternatywą dla testu t-Studenta dla grup sparowanych.
                        Test bazuje na [rangach]{{term:ranks}} różnic między parami danych, a nie na samych wartościach danych,
                        porównując medianę $M_a$ z grupy przed manipulacją (np. przed terapią) i medianę $M_A$ z grupy po manipulacji (np. po terapii).

                        $$ 
                        H_0: M_a = M_A
                        $$
                        $$
                        H_a: M_a \neq M_A
                        $$
                        Alternatywne formy hipotezy alternatywnej to:
                        $$
                        H_a: M_a > M_A
                        $$
                        lub
                        $$
                        H_a: M_a < M_A
                        $$
              - id: "unpaired-samples"
                label:
                  en: The groups are not [paired]{{term:paired}}
                  pl: Grupy nie są [sparowane]{{term:paired}}
                children:
                  - id: "mann-whitney-u-test"
                    label:
                      en: Mann-Whitney U test
                      pl: Test U Manna-Whitneya
                    content:
                      en: |
                        The Mann-Whitney U test is a non-parametric 
                        alternative to the Student's t-test for independent samples, 
                        used when the data in at least one of the groups do not have a normal distribution.

                        $$
                        H_0: \text{There is no difference between the groups}
                        $$
                        $$
                        H_a: \text{There is a difference between the groups}
                        $$
                      pl: |

                        Test U Manna-Whitneya jest [nieparametryczną]{{term:non-parametric}} 
                        alternatywą dla testu t-Studenta dla prób niezależnych, 
                        stosowaną, gdy dane w co najmniej jednej z grup nie 
                        mają [rozkładu]{{term:distribution}} normalnego.
                        
                        $$H_0: \text{Nie ma różnicy między grupami}$$
                        $$H_a: \text{Istnieje różnica między grupami}$$
                        
      - id: "more-than-two-samples"
        label:
          en: From several other groups of data (>2)
          pl: Od kilku innych grup danych (>2)
        children:
          - id: "is-normal"
            label:
              en: "The distribution of all groups is [normal]{{term:normal}}?"
              pl: "Rozkład we wszystkich grupach jest [normalny]{{term:normal}}?"
            children:
              - id: "variances-equal"
                label:
                  en: "All groups have equal [variances]{{term:variance}}"
                  pl: "Wszystkie grupy mają równe [wariancje]{{term:variance}}"
                children:
                  - id: "anova"
                    label:
                      en: "One-way ANOVA"
                      pl: "Jednoczynnikowa analiza wariancji (ANOVA)"
                    content:
                      en: |

                        ANOVA, or one-way analysis of variance, 
                        is an [omnibus]{{term:omnibus}} test, after 
                        which — in the case of obtaining statistically 
                        significant results — a so-called post-hoc test should be performed.

                        The ANOVA test allows us to assess whether 
                        there is a significant difference between the means in 3 or more $k$ groups of data.

                        $$
                        H_0: \mu_1 = \mu_2 = ... = \mu_k
                        $$
                        $$
                        H_a: \exists \ i, j \ such \ that \ \mu_i \neq \mu_j
                        $$

                        The ANOVA test requires the calculation of two types of [degrees of freedom]{{term:degrees_of_freedom}}:
                        - degrees of freedom between groups:
                          $$
                          df_{between} = k - 1
                          $$
                        - degrees of freedom within groups:
                          $$
                          df_{within} = n - k
                          $$
                        where $n$ is the total sample size (**the sum of the sample sizes from all groups**), and $k$ is the number of groups.

                        The recommended post-hoc test after the ANOVA test is the Tukey's test.
                      pl: |

                        ANOVA, czyli jednoczynnikowa analiza wariancji, 
                        jest tzw. [testem omnibusowym]{{term:omnibus}}, 
                        po którym — w przypadku uzyskania wyników istotnych 
                        statystycznie — należy wykonać tzw. test post-hoc (z łaciny: po fakcie).

                        Test ANOVA pozwala ocenić, czy w 3 lub więcej $k$ grupach danych istnieje istotna różnica między średnimi.

                        $$
                        H_0: \mu_1 = \mu_2 = ... = \mu_k
                        $$
                        $$
                        H_a: \exists \ i, j \ such \ that \ \mu_i \neq \mu_j
                        $$

                        Test ANOVA wymaga obliczenia dwóch rodzajów [stopni swobody]{{term:degrees_of_freedom}}:
                        - stopnie swobody między grupami:
                          $$
                          df_{between} = k - 1
                          $$
                        - stopnie swobody wewnątrz grup:
                          $$
                          df_{within} = n - k
                          $$
                        gdzie $n$ to liczebność całej próby (**suma liczebności próbek ze wszystkich grup**), a $k$ to liczba grup.

                        Rekomendowany test post-hoc po teście ANOVA to test Tukeya.
              - id: "variances-unequal"
                label:
                  en: "At least one group has different [variance]{{term:variance}}"
                  pl: "Przynajmniej jedna grupa ma inną [wariancję]{{term:variance}}"
                children:
                  - id: "welch-anova"
                    label:
                      en: "Welch's ANOVA"
                      pl: "ANOVA z korektą Welscha"
                    content:
                      en: |
                        
                        When there are differences in [variances]{{term:variance}} between groups, 
                        the one-way analysis of variance with Welch's correction should be used.

                        $$
                        H_0: \mu_1 = \mu_2 = ... = \mu_k
                        $$
                        $$
                        H_a: \exists \ i, j \ such \ that \ \mu_i \neq \mu_j
                        $$

                        Similar to the standard ANOVA test, the Welch's ANOVA test requires the calculation of two types of [degrees of freedom]{{term:degrees_of_freedom}}:
                        - degrees of freedom between groups:
                          $$
                          df_{between} = k - 1
                          $$
                          - degrees of freedom within groups:
                          $$
                          df_{within} = v
                          $$
                        
                        The value of $v$ is calculated based on the Welch-Satterthwaite approximation, which for $k$ groups with sample sizes $n_1, n_2, ..., n_k$ and variances $s_1^2, s_2^2, ..., s_k^2$ looks as follows:

                        $$
                        v \approx \frac{\left(\sum_{i=1}^k \frac{n_i}{s_i^2}\right)^2}{\sum_{i=1}^k \frac{n_i^2}{s_i^4 (n_i - 1)}}
                        $$

                        The recommended post-hoc test after the ANOVA test with Welch's correction is the Games-Howell test.
                      pl: |

                        W przypadku, gdy występują różnice 
                        [wariancji]{{term:variance}} między grupami, 
                        należy wykorzystać test jednokierunkowej analizy wariancji z korektą Welscha.

                        $$
                        H_0: \mu_1 = \mu_2 = ... = \mu_k
                        $$
                        $$
                        H_a: \exists \ i, j \ such \ that \ \mu_i \neq \mu_j
                        $$

                        Podobnie jak standardowy test ANOVA, test z korektą Welscha wymaga obliczenia dwóch rodzajów [stopni swobody]{{term:degrees_of_freedom}}:
                        - stopnie swobody między grupami:
                          $$
                          df_{between} = k - 1
                          $$
                          - stopnie swobody wewnątrz grup:
                          $$
                          df_{within} = v
                          $$
                        
                        Wartość $v$ liczonaa jest na podstawie przybliżenia Welcha-Satterthwaite'a, który dla $k$ grup o liczebnościach $n_1, n_2, ..., n_k$ i wariancjach $s_1^2, s_2^2, ..., s_k^2$ wygląda następująco:

                        $$
                        v \approx \frac{\left(\sum_{i=1}^k \frac{n_i}{s_i^2}\right)^2}{\sum_{i=1}^k \frac{n_i^2}{s_i^4 (n_i - 1)}}
                        $$

                        Rekomendowany test post-hoc po teście ANOVA z korektą Welscha to test Games-Howell'a.
          - id: "not-normal"
            label:
              en: "The distribution of at least one group is not [normal]{{term:normal}}"
              pl: "Rozkład przynajmniej jednej grupy nie jest [normalny]{{term:normal}}"
            children:
              - id: "paired-samples"
                label:
                  en: The groups are [paired]{{term:paired}}
                  pl: Grupy są [sparowane]{{term:paired}}
                children:
                  - id: "friedman-test"
                    label:
                      en: Friedman test
                      pl: Test Friedmana
                    content:
                      en: |
                      pl: |
              - id: "unpaired-samples"
                label:
                  en: The groups are not [paired]{{term:paired}}
                  pl: Grupy nie są [sparowane]{{term:paired}}
                children:
                  - id: "kruskal-wallis-test"
                    label:
                      en: Kruskal-Wallis test
                      pl: Test Kruskala-Wallisa
                    content:
                      en: |
                        The Kruskal-Wallis test is a non-parametric alternative to the 
                        one-way ANOVA, used when the data in at least one of the groups do not have a normal distribution.

                        $$
                        H_0: \text{There is no difference between the groups}
                        $$
                        $$
                        H_a: \text{There is a difference between the groups}
                        $$

                        The recommended post-hoc test after the Kruskal-Wallis test is Dunn's test with an appropriate correction, e.g., Bonferroni's.
                      pl: |
                        Test Kruskala-Wallisa jest [nieparametryczną]{{term:non-parametric}} 
                        alternatywą dla jednoczynnikowej analizy wariancji, 
                        stosowaną, gdy dane w co najmniej jednej z grup nie mają [rozkładu]{{term:distribution}} normalnego.

                        $$
                        H_0: \text{Nie ma różnicy między grupami}
                        $$
                        $$
                        H_a: \text{Istnieje różnica między grupami}
                        $$

                        Rekomendowany test post-hoc po teście Kruskala-Wallisa to test Dunna z odpowiednią poprawką, np. Bonferroniego.
  - id: "correlation"
    label:
      en: Is there a relationship between two variables?
      pl: Czy istnieje związek między dwiema zmiennymi?
    children:
      - id: "numerical-variables"
        label:
          en: Both variables are [numerical]{{term:numerical}}
          pl: Obie zmienne są [numeryczne]{{term:numerical}}
        children:
          - id: "independent"
            label:
              en: Observations in sample are independent
              pl: Obserwacja są od siebie niezależne
            children:
              - id: "is-normal"
                label:
                  en: "The distribution of both variables is [normal]{{term:normal}}"
                  pl: "Rozkład obu zmiennych jest [normalny]{{term:normal}}"
                children:
                  - id: "pearson-correlation"
                    label:
                      en: Pearson's correlation
                      pl: Korelacja Pearsona
                    content:
                      en: |
                        When data have a [normal]{{term:normal}} [distribution]{{term:distribution}}, 
                        we can check the [correlation]{{term:correlation}}, more precisely the 
                        linear relationship between them using Pearson's correlation test.
                        The Pearson's correlation coefficient $r$ for $n$ observations of variable
                        $x$ (with sample mean $\bar{x}$) and $y$ (with sample mean $\bar{y}$) 
                        is expressed by the formula:

                        $$
                        r = \frac{\sum_{i=1}^{n} (x_i - \bar{x})(y_i - \bar{y})}{\sqrt{\sum_{i=1}^{n} (x_i - \bar{x})^2 \sum_{i=1}^{n} (y_i - \bar{y})^2}}
                        $$

                        Correlation takes values in the range $[-1, 1]$. 
                        The absolute value $\mid r \mid$ indicates the 
                        strength of the correlation, while the sign indicates the direction.

                        1. $r > 0$ an increase in one variable is associated with an increase in the other,
                        1. $r < 0$ an increase in one variable is associated with a decrease in the other.

                        Correlation is symmetric, i.e., $r(x,y) = r(y,x)$.

                        > Remember, **correlation** does not imply causation between variables.

                        Be careful, Pearson's correlation is sensitive to 
                        [outliers]{{term:outlier}} and [anomalies]{{term:anomaly}} in the dataset.
                      pl: |

                        Gdy dane mają [rozkład]{{term:distribution}} [normalny]{{term:normal}}, możemy sprawdzić [korelację]{{term:correlation}}
                        a dokładniej liniową zależność między nimi za pomocą testu Pearsona.
                        Współczynnik pearsona $r$ dla $n$ obserwacji zmiennej 
                        $x$ (ze średnią próby $\bar{x}$) oraz $y$ (ze średnią z próby $\bar{y}$) wyraża się wzorem:

                        $$
                        r = \frac{\sum_{i=1}^{n} (x_i - \bar{x})(y_i - \bar{y})}{\sqrt{\sum_{i=1}^{n} (x_i - \bar{x})^2 \sum_{i=1}^{n} (y_i - \bar{y})^2}}
                        $$

                        Korelacja przyjmuje wartości w przedziale $[-1, 1]$. Wartość bezwzględna $\mid r \mid$ mówi o sile
                        korelacji, natomiast znak — o kierunku. 

                        1. $r > 0$ wzrostowi jednej zmiennej towarzyszy wzrost drugiej,
                        1. $r < 0$ wzrostowi jednej zmiennej towarzyszy spadek drugiej.

                        Korelacja jest symetryczna, tzn. $r(x,y) = r(y,x)$.

                        > Pamiętaj, **korelacja** nie bada związku przyczynowo-skutkowego między zmiennymi.

                        Uważaj, korelacja Pearsona jest wrażliwa na [obserwacje odstające]{{term:outlier}} i [anomalie]{{term:anomaly}} w zbiorze.

              - id: "not-normal"
                label:
                  en: "The distribution of at least one variable is not [normal]{{term:normal}}"
                  pl: "Rozkład przynajmniej jednej zmiennej nie jest [normalny]{{term:normal}}"
                children:
                  - id: "spearman-correlation"
                    label:
                      en: Spearman's rank correlation
                      pl: Korelacja rang Spearmana
                    content:
                      en: |
                        Spearman's rank correlation is a non-parametric measure of correlation.
                        It assesses how well the relationship between two variables can be described
                        using a monotonic function.
                        Spearman's rank correlation, or more precisely Spearman's rank correlation test,
                        calculates the correlation coefficient based on the ranks of the data rather than the actual data values.
                        Therefore, the Spearman's rank correlation coefficient is more robust to outliers and anomalies,
                        and it does not require the data to be normally distributed.

                        $$
                        H_0: \text{There is no correlation between the variables}
                        $$
                        $$
                        H_a: \text{There is a correlation between the variables}
                        $$

                        When the ranks assigned to the data do not repeat 
                        (i.e., there are no [tied ranks]{{term:tied_ranks}}) or 
                        there are few tied ranks, we can use a simplified formula 
                        for Spearman's rank correlation coefficient ($\rho$) [1]:

                        $$
                        \rho=1-\frac{6\sum_{i=1}^{n}d_i^2}{n(n^2-1)},
                        $$
                        where $d_i$ is the difference between the ranks of $x_i$ and $y_i$, and $n$ is the sample size.

                        When we are dealing with tied ranks, 
                        it is safer to use the general formula for 
                        Spearman's rank correlation coefficient, which is 
                        based on Pearson's correlation coefficient but uses 
                        ranks instead of actual data values.

                        > Remember, **correlation** does not imply causation between variables.

                        As Spearman's rank correlation uses ranks, 
                        it detects monotonic relationships 
                        (not necessarily linear), e.g., an exponential or logarithmic relationship.

                        ---

                        [1] Mohr, Donna L., William J. Wilson, and Rudolf J. Freund. "Chapter 14-nonparametric methods." Statistical Methods (2022): 651-683.
                      pl: |
                        [Korelacja]{{term:correlation}} Spearmana jest nieparametryczną
                        alterantywą dla korelacji Pearsona. Test Spearmana, 
                        a w zasadzie test korelacji [**rang**]{{term:ranks}} Spearmana
                        oblicza współczynnik korelacji bazując na [rangach]{{term:ranks}} a nie
                        na rzeczywistych wartościach. W związku z tym, współczynnik korelacji
                        Spearmana jest bardziej odporny na [wartości odstające]{{term:outlier}} 
                        i [anomalie]{{term:anomaly}}. Nie wymaga również rozkładu normalnego danych.

                        $$
                        H_0: \text{Brak korelacji między zmiennymi}
                        $$
                        $$
                        H_a: \text{Istnieje korelacja między zmiennymi}
                        $$

                        Gdy rangi przypisane danym nie powielają się (nie ma tzw. [rang wiązanych]{{term:tied_ranks}}) 
                        lub jest ich niewiele, możemy zastosować uproszczony wzór na
                        współczynnik korelacji rang Spearmana ($\rho$) [1]:

                        $$
                        \rho=1-\frac{6\sum_{i=1}^{n}d_i^2}{n(n^2-1)},
                        $$
                        gdzie $d_i$ to różnica między rangami $x_i$ i $y_i$ a $n$ to liczebność próby.

                        Gdy mamy do czynienia z rangami wiązanymi, bezpieczniej 
                        jest skorzystać z ogólnego wzoru na współczynnik korelacji rang Spearmana, 
                        który jest oparty na współczynniku korelacji Pearsona, ale zamiast rzeczywistych wartości danych, wykorzystuje rangi:

                        > Pamiętaj, **korelacja** nie bada związku przyczynowo-skutkowego między zmiennymi.

                        Z uwagi na wykorzystanie rang, korelacja Spearmana wykrywa 
                        zależności monotoniczne (niekoniecznie liniowe), np. zależność wykładniczą albo logarytmiczną.

                        ---

                        [1] Mohr, Donna L., William J. Wilson, and Rudolf J. Freund. "Chapter 14-nonparametric methods." Statistical Methods (2022): 651-683.
          - id: "categorical-variables"
            label:
              en: Both variables are [categorical]{{term:categorical}}
              pl: Obie zmienne są [kategoryczne]{{term:categorical}}
            children:
              - id: "paired"
                label:
                  en: "Data are [paired]{{term:paired}}"
                  pl: "Dane są [sparowane]{{term:paired}}"
                children:
                  - id: "mcnemar-test"
                    label:
                      en: McNemar's test
                      pl: Test McNemara
                    content:
                      en: |
                        McNemar's test is used to check the dependence between 
                        categorical variables when we are dealing with 
                        dependent ([paired]{{term:paired}}) samples, 
                        e.g., measurements before and after therapy on the same patients.

                        The requirement for McNemar's test is the dichotomous nature of the variables.

                        Similar to the chi-square test of independence, 
                        McNemar's test is based on a contingency table, 
                        but in this case, it is a 2x2 table since the variables are dichotomous.
                      pl: |

                        Test McNemara służy do sprawdzenia zależności między zmiennymi kategorycznymi,
                        gdy mamy do czynienia z próbami zależnymi ([sparowanymi]{{term:paired}}), 
                        np. pomiar przed i po terapii na tych samych pacjentach.

                        Wymogiem testu McNemara jest [**dychotomiczność**]{{term:dichotomous}} zmiennych.

                        Podobnie jak w przypadku testu $\chi^2$ niezależności, 
                        test McNemara opiera się na tabeli krzyżowej, 
                        ale w tym przypadku jest to tabela 2x2, ponieważ zmienne są dychotomiczne.
              - id: "not-paired"
                label:
                  en: "Data are not [paired]{{term:paired}}"
                  pl: "Dane nie są [sparowane]{{term:paired}}"
                children:
                  - id: "chi-square-test"
                    label:
                      en: Chi-square test of independence
                      pl: Test chi-kwadrat niezależności
                    content:
                      en: |

                        When we are dealing with categorical variables (nominal or ordinal), 
                        the chi-square test of independence allows us to check whether the variables $x$ and $y$ are dependent on each other.

                        $$
                        H_0: \text{Variables } x \text{ and } y \text{ are independent}
                        $$
                        $$
                        H_a: \text{There is a significant dependence between variables } x \text{ and } y
                        $$

                        The number of [degrees of freedom]{{term:degrees_of_freedom}} for the chi-square test of independence is calculated according to the formula:

                        $$
                        df = (r - 1)(c - 1),
                        $$
                        where $r$ is the number of rows and $c$ is the number of columns in the contingency table.

                        The chi-square test of independence is based on a **contingency table**. 
                        
                        Let's consider a simple example:

                        > Does the level of education (ordinal variable) depend on gender (nominal variable)?

                        To perform the analysis, we need to prepare a contingency table:

                        | Level of education | Women | Men | ROW TOTAL |
                        |--------------------|-------|-----|-----------|
                        | Higher             |  30   | 20  |  **50**  |
                        | Secondary          |  25   | 35  |  **60**  |
                        | Primary            |  15   | 10  |  **25**  |
                        | COLUMN TOTAL       | **70**|**65**| **135** |

                        The number of [degrees of freedom]{{term:degrees_of_freedom}} for the chi-square test of 
                        independence calculated according to the above formula is: $df = (3 - 1)(2 - 1) = 2$.

                        The chi-square test compares the observed frequencies (e.g., the number of women
                        with higher education) with the expected frequencies, 
                        which would be expected if the variables were independent of each other.

                        The expected frequencies are calculated as the product of the row total $R_i$ and the column total $C_j$, divided by the overall sample size $N$.
                        For the cell (Higher, Women), the expected frequency is:

                        $$
                        E_{ij} = \frac{(R_i)(C_j)}{N} = \frac{(50)(70)}{135} \approx 25.93
                        $$

                        Having computed the expected frequency for each combination, 
                        we can calculate the chi-square test statistic:

                        $$
                        \chi^2 = \sum_{i=1}^{r} \sum_{j=1}^{c} \frac{(O_{ij} - E_{ij})^2}{E_{ij}},
                        $$
                        where $O_{ij}$ is the observed frequency in cell $i,j$,
                        $E_{ij}$ is the expected frequency in that cell, and $r$ and
                        $c$ are the number of rows and columns in the contingency table (our table has 3 rows and 2 columns).

                        The chi-square test of independence has several assumptions that must be met:
                        1. The variables are categorical (we already know that),
                        1. One observation must fall into one category
                        (e.g., a person cannot simultaneously belong to the category of *higher education* and *secondary education*),
                        1. The samples are not [paired]{{term:paired}},
                        1. A sufficiently large sample size, so that the expected number of observations in most categories is greater than 5.
                      pl: |

                        Gdy mamy do czynienia ze zmiennymi kategorycznymi (nominalnymi lub porządkowymi),
                        test niezależności $\chi^2$ (czytaj: chi-kwadrat) umożliwja nam 
                        sprawdzenie, czy zmienne $x$ i $y$ są od siebie zależne.

                        $$
                        H_0: \text{Zmienne } x \text{ oraz } y \text{ są niezależne}
                        $$
                        $$
                        H_a: \text{Między zmiennymi } x \text{ oraz } y \text{ występuje istotna zależność}
                        $$

                        Liczba [stopni swobody]{{term:degrees_of_freedom}} dla testu niezależności $\chi^2$ jest obliczana według wzoru:

                        $$
                        df = (r - 1)(c - 1),
                        $$
                        gdzie $r$ to liczba wierszy, a $c$ to liczba kolumn w tabeli krzyżowej.

                        Test niezależności $\chi^2$ opiera się na **tabeli krzyżowej**. 
                        
                        Rozważmy prosty przykład:

                        > Czy poziom wykształcenia (zmienna porządkowa) zależy od płci (zmienna nominalna).

                        W celu wykonania analizy, musimy przygotować tabelę krzyżową:

                        | Poziom wykształcenia | Kobiety | Mężczyźni | SUMA (wiersze) |
                        |----------------------|---------|-----------|------|
                        | Wyższe               |    30   |    20     |  **50**  |
                        | Średnie              |    25   |    35     |  **60**  |
                        | Podstawowe           |    15   |    10     |  **25**  |
                        | SUMA (kolumny)       |  **70** |    **65** | **135** |

                        Liczba [stopni swobody]{{term:degrees_of_freedom}} dla testu niezależności 
                        obliczona wg powyższego wzoru wynosi: $df = (3 - 1)(2 - 1) = 2$.

                        Test $\chi^2$ porównuje obserwowane częstotliwości (np. liczba kobiet z wykształceniem wyższym) 
                        z oczekiwanymi częstotliwościami, które byłyby spodziewane, gdyby zmienne były od siebie niezależne.

                        Wartości oczekiwane są obliczane jako iloczyn sumy wiersza $i$ i sumy kolumny $j$, podzielony przez całkowitą liczebność próby.
                        Dla komórki (Wyższe, Kobiety) wartość oczekiwana wynosi:

                        $$
                        E_{ij} = \frac{(R_i)(C_j)}{N} = \frac{(50)(70)}{135} \approx 25.93
                        $$

                        Po obliczeniu wartości oczekiwanej dla każdej kombinacji, możemy obliczyć statystykę testową $\chi^2$:

                        $$
                        \chi^2 = \sum_{i=1}^{r} \sum_{j=1}^{c} \frac{(O_{ij} - E_{ij})^2}{E_{ij}},
                        $$

                        gdzie $O_{ij}$ to obserwowana liczba przypadków w komórce $i,j$, 
                        a $E_{ij}$ to oczekiwana liczba przypadków w tej komórce, zaś $r$ i $c$ to liczba wierszy i kolumn w tabeli krzyżowej (nasza tabela ma 3 wiersze i 2 kolumny).

                        Test niezależności $\chi^2$ ma kilka założeń, które muszą być spełnione:
                        1. zmienne są kategoryczne (to już wiemy),
                        1. jedna obserwacja musi przypadać na jedną kategorię 
                        (np. osoba badana nie może należeć jednoczeście do kategorii *wykształcenie wyższe* oraz *wykształcenie średnie*)
                        1. próbki nie są [sparowane]{{term:paired}},
                        1. dość duża liczebność próby, aby oczekiwana liczba obserwacji w większości kategorii była większa niż 5.

          - id: "dependent"
            label:
              en: Observations in sample are [dependent]{{term:dependent_samples}}
              pl: Obserwacja są od siebie [zależne]{{term:dependent_samples}}
            children:       
              - id: "timeseries"
                label: 
                  en: Data is a time series
                  pl: Dane to szereg czasowy
                children:
                  - id: "stationarity"
                    label: 
                      en: "Time series is [stationary]{{term:stationary}}"
                      pl: "Szereg czasowy jest [stacjonarny]{{term:stationary}}"
                    children:
                      - id: "granger"
                        label:
                          en: "Granger's causality test"
                          pl: "Test przyczynowości Grangera"   
                        content:
                          en: |
                            Granger causality test checks if lagged (historical) values of variable $x$
                            allow for bettwe forecasting of variable $y$.

                            This test relies on VAR model (vector autoregression), where each
                            value of a time series is a linear combination of its lagged values and/or lagged
                            values of other time series.

                            For Granger causality test, there are two models defined:
                            1. **constrained model** relying only of the lagged values of a time series itself:

                            $$
                            y_i = \alpha_0 + \sum_{j=1}^m \alpha_j y_{i-j} + \epsilon_i,
                            $$
                            where $m$ is the number of historical values of variable $y$.

                            2. **unconstrained model** taking into account also lagged values of variable $x$:

                            $$
                            y_i = \alpha_0 + \sum_{j=1}^m \alpha_j y_{i-j} + \sum_{j=1}^m \beta_j x_{i-j} + \epsilon_i,
                            $$         

                            In the problem stated this way, null hypothesis is the following:

                            $$
                            H_0: \beta_1 = \beta_2 = \beta_3 = \ldots = 0
                            $$

                            what can be understood as: *lagged values of $x$ do not help to predict the values of $y$.

                            $$
                            H_a: \beta_1 = \beta_2 = \beta_3 = \ldots \neq 0
                            $$             

                            > Granger causality **is not the true causality relationship** (in physical sense) 
                            > it is just about predictibility of one variable when knowing the other.              

                          pl: |
                            Test przyczynowości Grangera sprawdza, czy
                            historyczne wartości zmiennej $x$ pomagają
                            przewidzieć przyszłe wartości zmiennej $y$.

                            Test operuje na modelu VAR (ang. *vector auto regression*), gdzie 
                            każda wartość szeregu czasowego jest liniową kombinacją swoich historycznych wartości i/lub
                            innych szeregów czasowych.

                            Dla testu Grangera zdefiniowane są dwa modele:
                            1. **model ograniczony**, który bazuje wyłącznie na wartościach przeszłych zmiennej prognozowanej ($y$):

                            $$
                            y_i = \alpha_0 + \sum_{j=1}^m \alpha_j y_{i-j} + \epsilon_i,
                            $$
                            gdzie $m$ to liczba historycznych wartości zmiennej $y$.

                            2. **model nieograniczony**, który uwzględnia również wartości przeszłe zmiennej $x$:

                            $$
                            y_i = \alpha_0 + \sum_{j=1}^m \alpha_j y_{i-j} + \sum_{j=1}^m \beta_j x_{i-j} + \epsilon_i,
                            $$

                            W tak postawionym problemie, hipoteza zerowa brzmi:

                            $$
                            H_0: \beta_1 = \beta_2 = \beta_3 = \ldots = 0
                            $$

                            co możemy tłumaczyć jako: *wartości opóźnione zmiennej $x$ nie pomagają przewidzieć wartości zmiennej $y$.

                            $$
                            H_a: \beta_1 = \beta_2 = \beta_3 = \ldots \neq 0
                            $$

                            > Przyczynowość w sensie Grangera to **nie rzeczywisty związek przyczynowo skutkowy** 
                            > w sensie fizycznym, a określa przewidywalność jedenj zmiennej na podstawie drugiej.     

  - id: "variance"
    label:
      en: Is there a difference in [variances]{{term:variance}} between groups?
      pl: Czy istnieje różnica w [wariancjach]{{term:variance}} między grupami?
    children:
      - id: "unpaired"
        label:
          en: Data are not [paired]{{term:paired}}
          pl: Dane nie są [sparowane]{{term:paired}}
        children:
          - id: "levene-test"
            label:
              en: "Levene's test"
              pl: "Test Levene'a"
            content:
              en: | 
              pl: | 
                Test Levene'a sprawdza homogeniczność [wariancji]{{term:variance}}, 
                tzn. czy wariancje w grupach są równe.

                $$
                H_0: \text{Wariance są równe}
                $$
                $$
                H_a: \text{Wariancje są różne}
                $$


          

